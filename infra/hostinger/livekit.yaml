port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  stun_servers:
    - stun.l.google.com:19302

turn:
  enabled: true
  # Keep the public TURN domain aligned with the browser-facing LiveKit hostname.
  domain: livekit.alsyedinitiative.com
  udp_port: 443
  tls_port: 5349
  cert_file: /run/livekit-turn/fullchain.pem
  key_file: /run/livekit-turn/privkey.pem

redis:
  address: redis:6379

