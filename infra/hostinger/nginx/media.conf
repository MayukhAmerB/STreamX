server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /media/lecture_videos/ {
        return 404;
    }

    location ^~ /media/streams/ {
        return 404;
    }

    location /media/ {
        alias /media/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location ^~ /_protected_media/ {
        alias /media/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "private, max-age=300" always;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
