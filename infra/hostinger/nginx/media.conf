server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /media/ {
        alias /media/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
