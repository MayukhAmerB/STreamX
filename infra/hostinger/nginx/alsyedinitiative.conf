map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream frontend_app {
    server 127.0.0.1:3000;
}

upstream backend_app {
    server 127.0.0.1:8000;
}

upstream media_app {
    server 127.0.0.1:8090;
}

upstream livekit_app {
    server 127.0.0.1:7880;
}

upstream owncast_app {
    server 127.0.0.1:8080;
}
gzip on;
gzip_disable "msie6";
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    application/vnd.apple.mpegurl;

server {
    listen 80;
    server_name alsyedinitiative.com www.alsyedinitiative.com;

    client_max_body_size 2048m;

    location ^~ /_protected_media/ {
        internal;
        proxy_pass http://media_app/_protected_media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
    }

    location /admin/ {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
    }

    location ^~ /media/lecture_videos/ {
        return 404;
    }

    location ^~ /media/streams/ {
        return 404;
    }

    location /media/ {
        proxy_pass http://media_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /static/ {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /health/live {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
    }

    location /health/ready {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

