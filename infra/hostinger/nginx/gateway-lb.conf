upstream streamx_backend_pool {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=10s;
    server backend-2:8000 max_fails=3 fail_timeout=10s;
    server backend-3:8000 max_fails=3 fail_timeout=10s;
    server backend-4:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream streamx_frontend {
    server frontend:8080;
    keepalive 16;
}

upstream streamx_media {
    server media:80;
    keepalive 16;
}

map $http_x_forwarded_proto $streamx_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

gzip on;
gzip_disable "msie6";
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    application/vnd.apple.mpegurl;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;
    client_max_body_size 2048M;

    location = /gateway-healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # API + Django admin + health + metrics
    location ^~ /api/ {
        proxy_pass http://streamx_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $streamx_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    location ^~ /admin/ {
        proxy_pass http://streamx_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $streamx_forwarded_proto;
    }

    location ^~ /health/ {
        proxy_pass http://streamx_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $streamx_forwarded_proto;
    }

    location = /metrics {
        proxy_pass http://streamx_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $streamx_forwarded_proto;
    }

    location ^~ /static/ {
        proxy_pass http://streamx_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $streamx_forwarded_proto;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Public + protected media
    location ^~ /media/ {
        proxy_pass http://streamx_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /_protected_media/ {
        proxy_pass http://streamx_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://streamx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
