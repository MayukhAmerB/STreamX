[Definition]

# Match repeated failed login and password-reset abuse on StreamX auth endpoints.
# This relies on host nginx access logs using the restored client IP.
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "(?:POST|PUT|PATCH) /api/auth/(?:login|password-reset|password-reset-confirm)/ HTTP/\d+(?:\.\d+)?" (?:400|401|403|429) \d+ "[^"]*" "[^"]*"$
            ^<HOST> \S+ \S+ \[[^\]]+\] "POST /admin/login/(?:\?[^" ]*)? HTTP/\d+(?:\.\d+)?" 200 \d+ "[^"]*" "[^"]*"$

ignoreregex =
