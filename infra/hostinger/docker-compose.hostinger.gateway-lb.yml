services:
  gateway:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
      backend-4:
        condition: service_healthy
      frontend:
        condition: service_started
      media:
        condition: service_healthy
    volumes:
      - ./infra/hostinger/nginx/gateway-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8088:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/gateway-healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - appnet
