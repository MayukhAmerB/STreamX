name: streamx

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alsyedacademy}
      POSTGRES_USER: ${POSTGRES_USER:-alsyed_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alsyed_app} -d ${POSTGRES_DB:-alsyedacademy}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - ./backend/.env.hostinger.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_media:/app/media
      - recordings_data:/recordings:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request;req=urllib.request.Request('http://127.0.0.1:8000/health/live',headers={'Host':'${API_HOSTNAME:-api.alsyedinitiative.com}','X-Forwarded-Proto':'https'});resp=urllib.request.urlopen(req,timeout=3);sys.exit(0 if resp.status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-}
        VITE_ENABLE_PAYMENTS: ${VITE_ENABLE_PAYMENTS:-0}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:8080"
    networks:
      - appnet

  media:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - backend_media:/media:ro
      - ./infra/hostinger/nginx/media.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8090:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  transcoder:
    build:
      context: ./backend
    restart: always
    env_file:
      - ./backend/.env.hostinger.production
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "python",
        "manage.py",
        "transcode_lecture_streams",
        "--pending",
        "--watch",
        "--poll-seconds",
        "20",
      ]
    volumes:
      - backend_media:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_text().replace('\\x00', ' '); sys.exit(0 if 'transcode_lecture_streams' in cmd else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - appnet

  livekit:
    image: livekit/livekit-server:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./infra/hostinger/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "${LIVEKIT_UDP_PORT:-7882}:${LIVEKIT_UDP_PORT:-7882}/udp"
    networks:
      - appnet

  livekit-egress:
    image: livekit/egress:latest
    restart: always
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
    network_mode: "service:livekit"
    environment:
      EGRESS_CONFIG_FILE: /out/egress.yaml
    volumes:
      - ./infra/hostinger/egress.yaml:/out/egress.yaml:ro
      - recordings_data:/recordings

  owncast:
    image: gabekangas/owncast:latest
    restart: always
    command: ["-streamkey", "${OWNCAST_STREAM_KEY:?Set OWNCAST_STREAM_KEY in environment}"]
    volumes:
      - owncast_data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "1935"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - appnet

volumes:
  postgres_data:
    name: streamx_postgres_data
  redis_data:
    name: streamx_redis_data
  owncast_data:
    name: streamx_owncast_data
  backend_media:
    name: streamx_backend_media
  recordings_data:
    name: streamx_recordings_data

networks:
  appnet:
    driver: bridge
    name: streamx_appnet
