<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <link rel="preload" as="image" href="/logo.jpeg" fetchpriority="high" />
    <meta name="theme-color" content="#050808" />
    <style>
      body.preload-active {
        overflow: hidden;
      }

      body.preload-active #root {
        opacity: 0;
        filter: none;
        transform: none;
        will-change: opacity;
      }

      body.app-ready #root {
        opacity: 1;
        filter: none;
        transform: none;
        transition:
          opacity 760ms cubic-bezier(0.2, 0.68, 0.2, 1);
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        isolation: isolate;
        background: #000000;
        opacity: 0;
        will-change: opacity;
      }

      #boot-loader.logo-ready {
        opacity: 1;
        transition: opacity 220ms ease;
      }

      #boot-loader::before,
      #boot-loader::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #boot-loader::before {
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.024), transparent 48%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.008), rgba(0, 0, 0, 0));
        opacity: 1;
      }

      #boot-loader::after {
        background:
          radial-gradient(circle at center, transparent 18%, rgba(0, 0, 0, 0.93) 100%);
      }

      #boot-loader .loader-grid {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background: #030506;
      }

      #boot-loader .loader-grid::before,
      #boot-loader .loader-grid::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #boot-loader .loader-grid::before {
        background:
          radial-gradient(circle at 50% 4%, rgba(186, 208, 183, 0.22), transparent 42%);
        opacity: 1;
      }

      #boot-loader .loader-grid::after {
        background:
          linear-gradient(180deg, rgba(2, 4, 2, 0.2), rgba(1, 2, 1, 0.4) 62%, rgba(0, 1, 0, 0.62));
        opacity: 1;
      }

      #boot-loader .loader-grid canvas {
        width: 100%;
        height: 100%;
        display: block;
        opacity: 1;
        filter: none;
        transform: translateZ(0);
      }

      #boot-loader .loader-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        z-index: 3;
      }

      #boot-loader .loader-mark {
        position: relative;
        width: min(54vw, 290px);
        aspect-ratio: 1 / 1;
        overflow: visible;
      }

      #boot-loader .loader-mark::before {
        content: "";
        position: absolute;
        inset: 8%;
        border-radius: 9999px;
        border: 1px solid rgba(196, 202, 210, 0.3);
        box-shadow:
          0 0 20px rgba(154, 163, 172, 0.16),
          inset 0 0 14px rgba(196, 202, 210, 0.1);
        animation: halo-pulse 3.6s ease-in-out infinite;
        z-index: 1;
      }

      #boot-loader .loader-orb {
        position: absolute;
        inset: -19%;
        border-radius: 9999px;
        z-index: 0;
        background:
          radial-gradient(
            circle at 50% 53%,
            rgba(8, 10, 13, 0.97) 0 46%,
            rgba(8, 10, 13, 0.82) 60%,
            rgba(8, 10, 13, 0.2) 74%,
            rgba(8, 10, 13, 0) 100%
          ),
          conic-gradient(
            from 210deg at 50% 50%,
            rgba(180, 190, 202, 0) 0deg,
            rgba(201, 210, 222, 0.46) 86deg,
            rgba(157, 167, 179, 0.2) 170deg,
            rgba(192, 202, 216, 0.52) 286deg,
            rgba(180, 190, 202, 0) 360deg
          );
        box-shadow:
          0 0 34px rgba(163, 173, 186, 0.2),
          0 0 82px rgba(129, 138, 151, 0.14),
          inset 0 0 28px rgba(193, 202, 214, 0.12);
        filter: saturate(0.72) brightness(0.92);
        opacity: 0.78;
        transform: translateZ(0);
        animation: orb-breathe 7.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      #boot-loader .loader-logo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        clip-path: circle(47% at 50% 50%);
        mix-blend-mode: normal;
        filter: brightness(0.98) contrast(1.08) drop-shadow(0 14px 30px rgba(0, 0, 0, 0.64));
        position: relative;
        z-index: 2;
      }

      #boot-loader .loader-orbit {
        position: absolute;
        inset: 4%;
        border-radius: 9999px;
        animation: orbit-spin 5600ms linear infinite;
        box-shadow:
          inset 0 0 0 2px rgba(201, 213, 189, 0.34),
          0 0 16px rgba(153, 170, 142, 0.12);
        background: conic-gradient(
          from 0deg,
          rgba(201, 213, 189, 0.58) 0deg,
          rgba(201, 213, 189, 0.34) 75deg,
          rgba(201, 213, 189, 0.14) 190deg,
          rgba(201, 213, 189, 0.08) 280deg,
          rgba(201, 213, 189, 0.54) 360deg
        );
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
        z-index: 3;
      }

      #boot-loader .loader-orbit::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 100%;
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        background: #b7beb5;
        transform: translate(-50%, -50%);
        box-shadow:
          0 0 10px rgba(183, 190, 181, 0.52),
          0 0 18px rgba(183, 190, 181, 0.34);
      }

      #boot-loader .loader-orbit::after {
        content: none;
      }

      #boot-loader .loader-console {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 6px 12px;
        border: 1px solid rgba(201, 213, 189, 0.24);
        border-radius: 9999px;
        background: rgba(9, 13, 9, 0.62);
        font-family: Consolas, "Courier New", monospace;
        font-size: 14px;
        font-weight: 600;
        color: rgba(215, 224, 204, 0.94);
        letter-spacing: 0.1em;
        text-transform: none;
        text-shadow: 0 0 12px rgba(185, 199, 171, 0.2);
      }

      #boot-loader .loader-prompt {
        color: rgba(201, 213, 189, 0.95);
      }

      #boot-loader .loader-typed {
        display: inline-block;
        overflow: hidden;
        white-space: nowrap;
        clip-path: inset(0 100% 0 0);
        letter-spacing: 0.06em;
        border-right: 2px solid rgba(185, 199, 171, 0.9);
        animation:
          type-word 1.8s steps(24, end) 180ms forwards,
          caret-blink 720ms step-end infinite;
      }

      @media (max-width: 720px) {
        #boot-loader .loader-console {
          font-size: 12px;
          letter-spacing: 0.08em;
        }
      }

      body.app-ready #boot-loader {
        opacity: 0;
        filter: none;
        transform: none;
        pointer-events: none;
        transition:
          opacity 860ms cubic-bezier(0.2, 0.68, 0.2, 1);
      }

      @keyframes orbit-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes orb-breathe {
        0%,
        100% {
          transform: scale(0.985);
          opacity: 0.72;
        }

        50% {
          transform: scale(1.02);
          opacity: 0.9;
        }
      }

      @keyframes halo-pulse {
        0%,
        100% {
          transform: scale(0.992);
          opacity: 0.52;
        }

        50% {
          transform: scale(1.014);
          opacity: 0.78;
        }
      }

      @keyframes type-word {
        from {
          clip-path: inset(0 100% 0 0);
        }

        to {
          clip-path: inset(0 0 0 0);
        }
      }

      @keyframes caret-blink {
        0%, 49% {
          border-color: rgba(185, 199, 171, 0.9);
        }

        50%, 100% {
          border-color: transparent;
        }
      }
    </style>
    <title>Al syed Initiative</title>
  </head>
  <body class="bg-ink preload-active notranslate" translate="no">
    <div id="boot-loader" role="status" aria-label="Loading Al syed Initiative">
      <div class="loader-grid" aria-hidden="true">
        <canvas id="loader-grid-canvas"></canvas>
      </div>
      <div class="loader-content">
        <div class="loader-mark">
          <span class="loader-orb" aria-hidden="true"></span>
          <img
            src="/logo.jpeg"
            alt="Al syed Initiative logo"
            class="loader-logo"
            loading="eager"
            decoding="sync"
            fetchpriority="high"
          />
          <span class="loader-orbit" aria-hidden="true"></span>
        </div>
        <p class="loader-console" aria-hidden="true">
          <span class="loader-prompt">&gt;</span>
          <span class="loader-typed">Al Syed HQ</span>
        </p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var loader = document.getElementById("boot-loader");
        if (!loader) return;
        var markReady = function () {
          loader.classList.add("logo-ready");
        };

        var logo = loader.querySelector(".loader-logo");
        if (!logo) {
          markReady();
        } else if (logo.complete && logo.naturalWidth > 0) {
          markReady();
        } else {
          logo.addEventListener("load", markReady, { once: true });
          logo.addEventListener("error", markReady, { once: true });
          window.setTimeout(markReady, 350);
        }

        var canvas = document.getElementById("loader-grid-canvas");
        if (!canvas) return;
        var ctx = canvas.getContext("2d", { alpha: true });
        if (!ctx) return;

        var dpr = 1;
        var width = 0;
        var height = 0;
        var cell = 32;
        var rafId = 0;
        var active = true;
        var glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*+-=<>?/\\[]{}|";
        var prefersReducedMotion =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function distort(x, y, t) {
          var waveX = Math.sin(x * 0.012 + t * 0.9) * 4.2;
          var waveY = Math.cos(y * 0.014 - t * 0.8) * 3.8;
          var swirl = Math.sin((x + y) * 0.008 - t * 0.55) * 2.8;
          return [x + waveX + swirl, y + waveY - swirl * 0.45];
        }

        function drawGrid(t) {
          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#030506";
          ctx.fillRect(0, 0, width, height);

          var glowA = ctx.createRadialGradient(
            width * 0.18,
            height * 0.12,
            0,
            width * 0.18,
            height * 0.12,
            width * 0.6
          );
          glowA.addColorStop(0, "rgba(132, 170, 149, 0.18)");
          glowA.addColorStop(1, "rgba(132, 170, 149, 0)");
          ctx.fillStyle = glowA;
          ctx.fillRect(0, 0, width, height);

          var glowB = ctx.createRadialGradient(
            width * 0.82,
            height * 0.86,
            0,
            width * 0.82,
            height * 0.86,
            width * 0.54
          );
          glowB.addColorStop(0, "rgba(98, 132, 117, 0.18)");
          glowB.addColorStop(1, "rgba(98, 132, 117, 0)");
          ctx.fillStyle = glowB;
          ctx.fillRect(0, 0, width, height);

          var sampleStep = Math.max(8, Math.floor(cell * 0.34));
          var maxX = width + cell * 2;
          var maxY = height + cell * 2;

          for (var y = -cell; y <= maxY; y += cell) {
            ctx.beginPath();
            var firstInRow = true;
            for (var x = -cell; x <= maxX; x += sampleStep) {
              var distortedRow = distort(x, y, t);
              if (firstInRow) {
                ctx.moveTo(distortedRow[0], distortedRow[1]);
                firstInRow = false;
              } else {
                ctx.lineTo(distortedRow[0], distortedRow[1]);
              }
            }
            var rowIndex = Math.round((y + cell) / cell);
            ctx.strokeStyle =
              rowIndex % 4 === 0 ? "rgba(182, 215, 194, 0.24)" : "rgba(123, 155, 136, 0.16)";
            ctx.lineWidth = 1;
            ctx.stroke();
          }

          for (var gx = -cell; gx <= maxX; gx += cell) {
            ctx.beginPath();
            var firstInCol = true;
            for (var gy = -cell; gy <= maxY; gy += sampleStep) {
              var distortedCol = distort(gx, gy, t);
              if (firstInCol) {
                ctx.moveTo(distortedCol[0], distortedCol[1]);
                firstInCol = false;
              } else {
                ctx.lineTo(distortedCol[0], distortedCol[1]);
              }
            }
            var colIndex = Math.round((gx + cell) / cell);
            ctx.strokeStyle =
              colIndex % 5 === 0 ? "rgba(175, 209, 188, 0.22)" : "rgba(113, 148, 128, 0.15)";
            ctx.lineWidth = 1;
            ctx.stroke();
          }

          ctx.font = Math.max(9, Math.floor(cell * 0.34)) + "px Consolas, 'Courier New', monospace";
          ctx.textBaseline = "middle";

          for (var glyphY = -cell; glyphY <= maxY; glyphY += cell * 2) {
            for (var glyphX = -cell; glyphX <= maxX; glyphX += cell * 2) {
              var signal = Math.sin(glyphX * 0.018 + glyphY * 0.016 + t * 1.1);
              if (signal < 0.38) continue;
              var glyphPos = distort(glyphX, glyphY, t);
              var idx = Math.abs(Math.floor(glyphX * 7 + glyphY * 11 + t * 28)) % glyphs.length;
              var glyph = glyphs[idx];
              ctx.fillStyle =
                signal > 0.88 ? "rgba(190, 235, 214, 0.48)" : "rgba(132, 193, 170, 0.38)";
              ctx.fillText(glyph, glyphPos[0], glyphPos[1]);
              if (signal > 0.7) {
                ctx.fillStyle = "rgba(106, 168, 146, 0.26)";
                ctx.fillText(
                  glyphs[(idx + 17) % glyphs.length],
                  glyphPos[0] + cell * 0.32,
                  glyphPos[1] + cell * 0.26
                );
              }
            }
          }
        }

        function stopAnimation() {
          active = false;
          if (rafId) {
            window.cancelAnimationFrame(rafId);
          }
          window.removeEventListener("resize", resize);
        }

        function drawFrame(timestamp) {
          if (!active || !document.body.contains(loader)) {
            stopAnimation();
            return;
          }

          if (document.body.classList.contains("app-ready")) {
            stopAnimation();
            return;
          }

          drawGrid(timestamp * 0.001);
          rafId = window.requestAnimationFrame(drawFrame);
        }

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          width = Math.max(window.innerWidth, 1);
          height = Math.max(window.innerHeight, 1);
          cell = clamp(Math.floor(width / 44), 28, 42);
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          drawGrid(0);
        }

        resize();
        if (prefersReducedMotion) {
          drawGrid(0);
        } else {
          rafId = window.requestAnimationFrame(drawFrame);
        }

        window.addEventListener("resize", resize);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
